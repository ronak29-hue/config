spring.application.name=category-service

server.port=${PORT:9091}

#db configuration

spring.datasource.url=jdbc:mysql://localhost:3309/categorydb
spring.datasource.username=user
spring.datasource.password=user123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost

#actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoints.shutdown.enabled=true
management.info.env.enabled=true
info.app.name=Category-DEV-Service-config-server
info.app.description=This is category DEV service
info.app.version=1.0D

