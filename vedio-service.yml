server:
  port: 9093

spring:
  application:
    name: vedio-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  data:
    mongodb:
      host: localhost
      port: 27017
      database: videodb

vedio:
  upload:
    path: "uploads/vedios"

#eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: "http://localhost:8761/eureka/"
  instance:
    prefer-ip-address: true

#endpoint configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"
    shutdown:
      enabled: true
  info:
    env:
      enabled: true
info:
  app:
    name: "Vedio-Service-config-server"
    description: "This is Vedio service.Refresh by bus cloud"
    version: "1.0"
